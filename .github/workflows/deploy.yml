name: Deploy Landing Zone
on: [push]

permissions:
  id-token: write    # Required for OIDC
  contents: read     # Required for Checkout

env:
  # Account IDs for CDK Context
  MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
  LOG_ARCHIVE_ACCOUNT_ID: ${{ secrets.LOG_ARCHIVE_ACCOUNT_ID }}
  NETWORK_ACCOUNT_ID: ${{ secrets.NETWORK_ACCOUNT_ID }}
  SHARED_SERVICES_ACCOUNT_ID: ${{ secrets.SHARED_SERVICES_ACCOUNT_ID }}
  WORKLOAD_ACCOUNT_ID: ${{ secrets.WORKLOAD_ACCOUNT_ID }}
  ORG_ROOT_ID: ${{ secrets.ORG_ROOT_ID }}

jobs:
  # 1. MANAGEMENT ACCOUNT: Governance & Billing
  deploy-mgmt:
    name: 1. Management (Governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Mgmt)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.MGMT_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy OrgStack
        run: |
          pip install -r requirements.txt
          npx cdk deploy OrgStack --require-approval never

  # # 2. LOG-ARCHIVE ACCOUNT: Security Vault
