name: Deploy Landing Zone
on: [push]

permissions:
  id-token: write    # Required for OIDC
  contents: read     # Required for Checkout

env:
  MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
  LOG_ARCHIVE_ACCOUNT_ID: ${{ secrets.LOG_ARCHIVE_ACCOUNT_ID }}
  NETWORK_ACCOUNT_ID: ${{ secrets.NETWORK_ACCOUNT_ID }}
  WORKLOAD_ACCOUNT_ID: ${{ secrets.WORKLOAD_ACCOUNT_ID }}

jobs:
  # 1. MANAGEMENT
  deploy-mgmt:
    name: 1. Management (Governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.MGMT_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy
        run: |
          pip install -r requirements.txt
          npx cdk deploy OrgGovernanceStack --require-approval never

  # 2. LOG-ARCHIVE
  deploy-security:
    name: 2. Security (Logging)
    needs: deploy-mgmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.LOG_ARCHIVE_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy
        run: |
          pip install -r requirements.txt
          npx cdk deploy LogArchiveCentralStack --require-approval never

  # 3. GLOBAL CONTROL (MUMBAI)
  deploy-mumbai:
    name: 3. Networking (Mumbai Control)
    needs: deploy-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.NETWORK_ROLE_ARN }}
          aws-region: ap-south-1
      - name: Deploy
        run: |
          pip install -r requirements.txt
          npx cdk deploy GlobalControlNetworkMumbai --require-approval never

  # 4. WORKLOAD INFRA & BASELINE
  deploy-workload:
    name: 4. Workload (Shared Infra & Baseline)
    needs: deploy-mumbai
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.WORKLOAD_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy Workload
        run: |
          pip install -r requirements.txt
          npx cdk deploy WorkloadSharedNetwork WorkloadAccountBaseline --require-approval never
