name: Deploy Landing Zone
on: [push]

permissions:
  id-token: write    # Required for OIDC
  contents: read     # Required for Checkout

env:
  # Account IDs for CDK Context
  MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
  LOG_ARCHIVE_ACCOUNT_ID: ${{ secrets.LOG_ARCHIVE_ACCOUNT_ID }}
  NETWORK_ACCOUNT_ID: ${{ secrets.NETWORK_ACCOUNT_ID }}
  WORKLOAD_ACCOUNT_ID: ${{ secrets.WORKLOAD_ACCOUNT_ID }}
  ORG_ROOT_ID: ${{ secrets.ORG_ROOT_ID }}

jobs:
  # 1. MANAGEMENT ACCOUNT: Governance & Billing
  deploy-mgmt:
    name: 1. Management (Governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Mgmt)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.MGMT_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy OrgStack
        run: |
          pip install -r requirements.txt
          npx cdk deploy OrgStack --require-approval never

  # 2. LOG-ARCHIVE ACCOUNT: Security Vault
  deploy-security:
    name: 2. Security (Logging)
    needs: deploy-mgmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Log-Archive)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.LOG_ARCHIVE_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy LogArchiveStack
        run: |
          pip install -r requirements.txt
          npx cdk deploy LogArchiveStack --require-approval never

  # 3. NETWORKING ACCOUNT: Regional Traffic Control
  deploy-network:
    name: 3. Networking (Traffic)
    needs: deploy-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk

      # - name: Configure AWS (Mumbai)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.NETWORK_ROLE_ARN }}
      #     aws-region: ap-south-1
      # - name: Deploy Mumbai VPC
      #   run: npx cdk deploy NetworkMumbai --require-approval never


  # 4. WORKLOAD ACCOUNT: AI Apps & Automation
  deploy-workload:
    name: 4. Workload Platform
    needs: deploy-network
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Workload)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.WORKLOAD_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy Shared Network & Baseline
        run: |
          pip install -r requirements.txt
          npx cdk deploy WorkloadStack --require-approval never
