name: Deploy Landing Zone
on: [push]

permissions:
  id-token: write
  contents: read

env:
  # Account IDs for CDK context
  MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
  LOG_ARCHIVE_ACCOUNT_ID: ${{ secrets.LOG_ARCHIVE_ACCOUNT_ID }}
  NETWORK_ACCOUNT_ID: ${{ secrets.NETWORK_ACCOUNT_ID }}
  WORKLOAD_ACCOUNT_ID: ${{ secrets.WORKLOAD_ACCOUNT_ID }}
  ORG_ROOT_ID: ${{ secrets.ORG_ROOT_ID }}

jobs:
  deploy-mgmt:
    name: 1. Management (Governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Management)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.MGMT_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy Org
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk
          npx cdk deploy OrgStack --require-approval never

  deploy-security:
    name: 2. Log-Archive (Security)
    needs: deploy-mgmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Security)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.LOG_ARCHIVE_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy Logs
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk
          npx cdk deploy LogArchiveStack --require-approval never

  deploy-network:
    name: 3. Networking (Traffic)
    needs: deploy-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Network)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.NETWORK_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy Networks (Mumbai & VA)
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk
          npx cdk deploy NetworkMumbai NetworkVirginia --require-approval never

  deploy-workload:
    name: 4. Workload (AI Platform)
    needs: deploy-network
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Workload)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.WORKLOAD_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy App
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk
          npx cdk deploy WorkloadStack --require-approval never
