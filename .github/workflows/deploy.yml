name: Deploy Landing Zone
on: [push]
permissions:
  id-token: write
  contents: read

env:
  MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
  ORG_ROOT_ID: ${{ secrets.ORG_ROOT_ID }}
  LOG_ARCHIVE_ACCOUNT_ID: ${{ secrets.LOG_ARCHIVE_ACCOUNT_ID }}
  NETWORK_ACCOUNT_ID: ${{ secrets.NETWORK_ACCOUNT_ID }}
  WORKLOAD_ACCOUNT_ID: ${{ secrets.WORKLOAD_ACCOUNT_ID }}
  # ... add others as needed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1 
      - run: pip install -r requirements.txt
      - run: npm install -g aws-cdk
      - run: npx cdk deploy --all --require-approval never
