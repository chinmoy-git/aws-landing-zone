  #       run: |
  #         pip install -r requirements.txt
  #         npx cdk deploy LogArchiveStack --require-approval never

  # 3. NETWORKING ACCOUNT: Regional Traffic Control
  deploy-network:
    name: 3. Networking (Traffic)
    needs: deploy-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS (Network Virginia)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.NETWORK_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy Central Network
        run: |
          pip install -r requirements.txt
          npx cdk deploy NetworkStack --require-approval never


